PACKAGE_NAME="i2c-hid-polling"
PACKAGE_VERSION="7.0"

# Build via the target kernel's kbuild (works across kernel updates, not just
# the currently-running kernel). obj-m lives in our Makefile.
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

# Both modules land in /updates, which depmod searches BEFORE the in-tree
# drivers/hid/i2c-hid/*.ko — so these override the stock ones.
BUILT_MODULE_NAME[0]="i2c-hid"
DEST_MODULE_LOCATION[0]="/updates"

BUILT_MODULE_NAME[1]="i2c-hid-acpi"
DEST_MODULE_LOCATION[1]="/updates"

AUTOINSTALL="yes"
